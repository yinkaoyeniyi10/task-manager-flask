{% extends 'base.html' %}
{% block head %} 
<title>Task Manager</title>
{% endblock %}

{% block body %} 
<div class="content">
    <h1 style="text-align: center">Update Task</h1>
    <form actions="/update/{{tasks.id}}" method="POST">
        <input type="text" name="content" id="content" value="{{tasks.id}}">
        <input type="submit" value="Update"> 
    </form>
</div>
{% endblock %}
